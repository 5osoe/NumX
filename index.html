<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumX | Professional PDF Numbering</title>
    <link rel="stylesheet" href="style.css">
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">Num<span>X</span></div>
            
            <div class="sidebar-scroll">
                <section class="group">
                    <h3>1. File</h3>
                    <div class="control-row">
                        <label class="upload-btn">
                            Upload PDF
                            <input type="file" id="pdf-upload" accept="application/pdf" hidden>
                        </label>
                    </div>
                    <div id="repeat-container" class="control-row hidden">
                        <label>Repeat Page (Copies)</label>
                        <input type="number" id="repeat-count" value="1" min="1">
                    </div>
                </section>

                <section class="group">
                    <div class="flex-between">
                        <h3>2. Elements</h3>
                        <button id="add-element" class="btn-small">+ Add</button>
                    </div>
                    <div id="element-list"></div>
                </section>

                <div id="element-settings" class="disabled">
                    <section class="group">
                        <h3>3. Content</h3>
                        <div class="control-row">
                            <label>Format ({n} = number)</label>
                            <input type="text" id="format" placeholder="Page {n}">
                        </div>
                        <div class="grid-2">
                            <div>
                                <label>Start</label>
                                <input type="number" id="start-num" value="1">
                            </div>
                            <div>
                                <label>Padding</label>
                                <select id="padding">
                                    <option value="1">1</option>
                                    <option value="2">01</option>
                                    <option value="3">001</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <section class="group">
                        <h3>4. Page Rules</h3>
                        <div class="control-row">
                            <label>Apply To</label>
                            <select id="apply-to">
                                <option value="all">All Pages</option>
                                <option value="odd">Odd Pages Only</option>
                                <option value="even">Even Pages Only</option>
                            </select>
                        </div>
                        <div class="control-row">
                            <label>Start From Page</label>
                            <input type="number" id="start-page" value="1" min="1">
                        </div>
                    </section>

                    <section class="group">
                        <h3>5. Style</h3>
                        <div class="grid-2">
                            <div>
                                <label>Size</label>
                                <input type="number" id="font-size" value="12">
                            </div>
                            <div>
                                <label>Color</label>
                                <input type="color" id="font-color" value="#000000">
                            </div>
                        </div>
                        <div class="control-row">
                            <label>Opacity</label>
                            <input type="range" id="opacity" min="0" max="100" value="100">
                        </div>
                    </section>

                    <section class="group">
                        <h3>6. Position & Rotation</h3>
                        <div class="grid-2">
                            <div>
                                <label>X (%)</label>
                                <input type="number" id="pos-x" step="0.1" value="50">
                            </div>
                            <div>
                                <label>Y (%)</label>
                                <input type="number" id="pos-y" step="0.1" value="95">
                            </div>
                        </div>
                        <div class="control-row">
                            <label>Rotation</label>
                            <input type="range" id="rotation" min="0" max="360" value="0">
                        </div>
                    </section>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="viewer">
            <header class="top-bar">
                <div class="nav-controls">
                    <button id="prev-page">←</button>
                    <span>Page <span id="current-page-num">1</span> / <span id="total-pages-num">1</span></span>
                    <button id="next-page">→</button>
                </div>
                <div class="zoom-controls">
                    <button id="zoom-out">-</button>
                    <span id="zoom-level">100%</span>
                    <button id="zoom-in">+</button>
                </div>
                <button id="export-btn" class="primary-btn">Download PDF</button>
            </header>

            <div class="preview-container" id="drop-zone">
                <div id="pdf-canvas-wrapper">
                    <canvas id="pdf-canvas"></canvas>
                    <div id="overlay-container"></div>
                </div>
                <div id="empty-state">
                    <p>Drag & Drop PDF or Click Upload</p>
                </div>
            </div>
        </main>
    </div>

    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
